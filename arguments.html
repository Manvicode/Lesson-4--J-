<html>
    <body>
        <p>finding the largest number with help of argument objects</p>
        <p id="result"></p>
        <script>
            function findMax() {
                var i;
                var max = 0;
                for(i = 0; i < arguments.length; i++) {
                    if (arguments[i] > max) {
                        max = arguments[i];
                    }
                }
                return max;
            }

            document.getElementById("result").innerHTML = findMax(4000000357850,2348720000975,247315243685);
        </script>
    </body>
</html>
